apiVersion: ome.io/v1beta1
kind: ClusterServingRuntime
metadata:
  name: srt-gpt-oss-120b-eagle3
spec:
  disabled: false
  supportedModelFormats:
    - modelFramework:
        name: transformers
        version: "4.55.0"
      modelFormat:
        name: safetensors
        version: "1.0.0"
      modelArchitecture: GptOssForCausalLM
      autoSelect: false
      priority: 1
  modelSizeRange:
    min: 115B
    max: 125B
  draftModelSizeRange:
    min: 0.1B
    max: 1B
  supportedDraftModelFormats:
    - modelFormat:
        name: safetensors
        version: "1.0.0"
  protocolVersions:
    - openAI
  engineConfig:
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "8080"
      prometheus.io/path: "/metrics"
    labels:
      logging-forward: enabled
    tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
    volumes:
      - name: dshm
        emptyDir:
          medium: Memory
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: node.kubernetes.io/instance-type
                  operator: In
                  values:
                    - BM.GPU.H100.8
    runner:
      name: ome-container
      image: docker.io/lmsysorg/sglang:v0.5.8.post1-cu130-amd64
      ports:
        - containerPort: 8080
          name: http1
          protocol: TCP
      command:
        - /bin/bash
        - '-lc'
        - --
      args:
        - |
          python3 -m sglang.launch_server \
          --host=0.0.0.0 \
          --port=8080 \
          --enable-metrics \
          --log-requests \
          --log-requests-level=1 \
          --model-path="$MODEL_PATH" \
          --tp=2 \
          --tool-call-parser=gpt-oss \
          --reasoning-parser=gpt-oss \
          --speculative-draft-model-path="$DRAFT_MODEL_PATH" \
          --speculative-algorithm=EAGLE3 \
          --speculative-num-steps=3 \
          --speculative-eagle-topk=8 \
          --speculative-num-draft-tokens=16
      volumeMounts:
        - mountPath: /dev/shm
          name: dshm
      resources:
        requests:
          cpu: 30
          memory: 256Gi
          nvidia.com/gpu: 2
        limits:
          cpu: 30
          memory: 256Gi
          nvidia.com/gpu: 2
      readinessProbe:
        httpGet:
          path: /health_generate
          port: 8080
        failureThreshold: 3
        successThreshold: 1
        periodSeconds: 60
        timeoutSeconds: 200
      livenessProbe:
        httpGet:
          path: /health
          port: 8080
        failureThreshold: 5
        successThreshold: 1
        periodSeconds: 60
        timeoutSeconds: 60
      startupProbe:
        httpGet:
          path: /health_generate
          port: 8080
        failureThreshold: 150
        successThreshold: 1
        periodSeconds: 6
        initialDelaySeconds: 60
        timeoutSeconds: 30