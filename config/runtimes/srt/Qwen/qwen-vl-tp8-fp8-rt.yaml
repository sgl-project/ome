apiVersion: ome.io/v1beta1
kind: ClusterServingRuntime
metadata:
  name: srt-qwen-vl-tp8-fp8
spec:
  disabled: false
  supportedModelFormats:
    - modelFramework:
        name: transformers
        version: "4.57.0.dev0"
      modelFormat:
        name: safetensors
        version: "1.0.0"
      quantization: fp8
      autoSelect: true
      modelArchitecture: Qwen3_5MoeForConditionalGeneration
      version: "1.0.0"
      priority: 1
  modelSizeRange:
    min: 357.3B
    max: 436.7B
  protocolVersions:
    - openAI
  engineConfig:
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "8080"
      prometheus.io/path: "/metrics"
    labels:
      logging-forward: enabled
    tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
    volumes:
      - name: dshm
        emptyDir:
          medium: Memory
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: node.kubernetes.io/instance-type
                  operator: In
                  values:
                    - BM.GPU.H100.8
    runner:
      name: ome-container
      image: fra.ocir.io/idqj093njucb/smg:1.2.0-sglang-v0.5.9
      ports:
        - containerPort: 8080
          name: http1
          protocol: TCP
      command:
        - /bin/bash
        - '-lc'
        - --
      args:
        - |
          python3 -m smg.launch_server \
          --enable-metrics \
          --enable-multimodal \
          --host 0.0.0.0 \
          --log-requests \
          --log-requests-level 1 \
          --mem-fraction-static 0.82 \
          --model-path "$MODEL_PATH" \
          --port 8080 \
          --tp-size 8 \
          --trust-remote-code \
          --grpc-mode \
          --router-request-id-headers "opc-request-id"
      volumeMounts:
        - mountPath: /dev/shm
          name: dshm
      resources:
        requests:
          cpu: 128
          memory: 512Gi
          nvidia.com/gpu: 8
        limits:
          cpu: 128
          memory: 512Gi
          nvidia.com/gpu: 8

      readinessProbe:
        httpGet:
          path: /health_generate
          port: 8080
        failureThreshold: 3
        successThreshold: 1
        periodSeconds: 90
        timeoutSeconds: 20

      livenessProbe:
        httpGet:
          path: /health
          port: 8080
        failureThreshold: 5
        successThreshold: 1
        periodSeconds: 60
        timeoutSeconds: 60

      startupProbe:
        httpGet:
          path: /health_generate
          port: 8080
        failureThreshold: 300  # takes longer for larger models
        successThreshold: 1
        periodSeconds: 6
        initialDelaySeconds: 60
        timeoutSeconds: 30
