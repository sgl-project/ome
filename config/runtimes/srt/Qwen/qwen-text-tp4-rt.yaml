apiVersion: ome.io/v1beta1
kind: ClusterServingRuntime
metadata:
  name: srt-qwen-text-tp4
spec:
  disabled: false
  supportedModelFormats:
    - modelFramework:
        name: transformers
        version: "4.32.0"
      modelFormat:
        name: safetensors
        version: "1.0.0"
      autoSelect: true
      modelArchitecture: QWenLMHeadModel
      version: "1.0.0"
      priority: 1
    - modelFramework:
        name: transformers
        version: "4.37.0"
      modelFormat:
        name: safetensors
        version: "1.0.0"
      autoSelect: true
      modelArchitecture: Qwen2ForCausalLM
      version: "1.0.0"
      priority: 1
    - modelFramework:
        name: transformers
        version: "4.37.2"
      modelFormat:
        name: safetensors
        version: "1.0.0"
      autoSelect: true
      modelArchitecture: Qwen2ForCausalLM
      version: "1.0.0"
      priority: 1
    - modelFramework:
        name: transformers
        version: "4.40.1"
      modelFormat:
        name: safetensors
        version: "1.0.0"
      autoSelect: true
      modelArchitecture: Qwen2ForCausalLM
      version: "1.0.0"
      priority: 1
    - modelFramework:
        name: transformers
        version: "4.41.2"
      modelFormat:
        name: safetensors
        version: "1.0.0"
      autoSelect: true
      modelArchitecture: Qwen2ForCausalLM
      version: "1.0.0"
      priority: 1
    - modelFramework:
        name: transformers
        version: "4.43.1"
      modelFormat:
        name: safetensors
        version: "1.0.0"
      autoSelect: true
      modelArchitecture: Qwen2ForCausalLM
      version: "1.0.0"
      priority: 1
    - modelFramework:
        name: transformers
        version: "4.51.0"
      modelFormat:
        name: safetensors
        version: "1.0.0"
      autoSelect: true
      modelArchitecture: Qwen3ForCausalLM
      version: "1.0.0"
      priority: 1
    - modelFramework:
        name: transformers
        version: "4.51.0"
      modelFormat:
        name: safetensors
        version: "1.0.0"
      autoSelect: true
      modelArchitecture: Qwen3MoeForCausalLM
      version: "1.0.0"
      priority: 1
  modelSizeRange:
    min: 64.8B
    max: 121B
  protocolVersions:
    - openAI
  engineConfig:
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "8080"
      prometheus.io/path: "/metrics"
    labels:
      logging-forward: enabled
    tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
    volumes:
      - name: dshm
        emptyDir:
          medium: Memory
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: node.kubernetes.io/instance-type
                  operator: In
                  values:
                    - BM.GPU.A100-v2.8
                    - BM.GPU.H100.8
                    - BM.GPU.H200-NC.8
                    - BM.GPU.H200.8
    runner:
      name: ome-container
      image: ord.ocir.io/idqj093njucb/official-sgl:v0.5.9.38e8377-cu129
      ports:
        - containerPort: 8080
          name: http1
          protocol: TCP
      command:
        - /bin/bash
        - '-lc'
        - --
      args:
        - |
          python3 -m sglang.launch_server \
          --enable-metrics \
          --host 0.0.0.0 \
          --log-requests \
          --log-requests-level=1 \
          --mem-fraction-static 0.9 \
          --model-path "$MODEL_PATH" \
          --port 8080 \
          --tp-size 4 \
          --trust-remote-code
      volumeMounts:
        - mountPath: /dev/shm
          name: dshm
      resources:
        requests:
          cpu: 20
          memory: 160Gi
          nvidia.com/gpu: 4
        limits:
          cpu: 20
          memory: 160Gi
          nvidia.com/gpu: 4

      readinessProbe:
        httpGet:
          path: /health_generate
          port: 8080
        failureThreshold: 3
        successThreshold: 1
        periodSeconds: 90
        timeoutSeconds: 20

      livenessProbe:
        httpGet:
          path: /health
          port: 8080
        failureThreshold: 5
        successThreshold: 1
        periodSeconds: 60
        timeoutSeconds: 60

      startupProbe:
        httpGet:
          path: /health_generate
          port: 8080
        failureThreshold: 150
        successThreshold: 1
        periodSeconds: 6
        initialDelaySeconds: 60
        timeoutSeconds: 30
