apiVersion: ome.io/v1beta1
kind: ClusterServingRuntime
metadata:
  name: vllm-qwen-tp4
spec:
  disabled: false
  supportedModelFormats:
    - modelFramework:
        name: transformers
        version: "4.32.0"
      modelFormat:
        name: safetensors
        version: "1.0.0"
      autoSelect: true
      modelArchitecture: QWenLMHeadModel
      version: "1.0.0"
      priority: 1
    - modelFramework:
        name: transformers
        version: "4.37.0"
      modelFormat:
        name: safetensors
        version: "1.0.0"
      autoSelect: true
      modelArchitecture: Qwen2ForCausalLM
      version: "1.0.0"
      priority: 1
    - modelFramework:
        name: transformers
        version: "4.37.2"
      modelFormat:
        name: safetensors
        version: "1.0.0"
      autoSelect: true
      modelArchitecture: Qwen2ForCausalLM
      version: "1.0.0"
      priority: 1
    - modelFramework:
        name: transformers
        version: "4.40.1"
      modelFormat:
        name: safetensors
        version: "1.0.0"
      autoSelect: true
      modelArchitecture: Qwen2ForCausalLM
      version: "1.0.0"
      priority: 1
    - modelFramework:
        name: transformers
        version: "4.41.2"
      modelFormat:
        name: safetensors
        version: "1.0.0"
      autoSelect: true
      modelArchitecture: Qwen2ForCausalLM
      version: "1.0.0"
      priority: 1
    - modelFramework:
        name: transformers
        version: "4.43.1"
      modelFormat:
        name: safetensors
        version: "1.0.0"
      autoSelect: true
      modelArchitecture: Qwen2ForCausalLM
      version: "1.0.0"
      priority: 1
    - modelFramework:
        name: transformers
        version: "4.51.0"
      modelFormat:
        name: safetensors
        version: "1.0.0"
      autoSelect: true
      modelArchitecture: Qwen3ForCausalLM
      version: "1.0.0"
      priority: 1
    - modelFramework:
        name: transformers
        version: "4.51.0"
      modelFormat:
        name: safetensors
        version: "1.0.0"
      autoSelect: true
      modelArchitecture: Qwen3MoeForCausalLM
      version: "1.0.0"
      priority: 1
    - modelFramework:
        name: transformers
        version: "4.39.0.dev0"
      modelFormat:
        name: safetensors
        version: "1.0.0"
      autoSelect: true
      modelArchitecture: Qwen2MoeForCausalLM
      version: "1.0.0"
      priority: 1
    - modelFramework:
        name: transformers
        version: "4.40.1"
      modelFormat:
        name: safetensors
        version: "1.0.0"
      autoSelect: true
      modelArchitecture: Qwen2MoeForCausalLM
      version: "1.0.0"
      priority: 1
    - modelFramework:
        name: transformers
        version: "4.41.2"
      modelFormat:
        name: safetensors
        version: "1.0.0"
      autoSelect: true
      modelArchitecture: Qwen2VLForConditionalGeneration
      version: "1.0.0"
      priority: 1
    - modelFramework:
        name: transformers
        version: "4.41.2"
      modelFormat:
        name: safetensors
        version: "1.0.0"
      autoSelect: true
      modelArchitecture: Qwen2_5_VLForConditionalGeneration
      version: "1.0.0"
      priority: 1
    - modelFramework:
        name: transformers
        version: "4.49.0"
      modelFormat:
        name: safetensors
        version: "1.0.0"
      autoSelect: true
      modelArchitecture: Qwen2_5_VLForConditionalGeneration
      version: "1.0.0"
      priority: 1
    - modelFramework:
        name: transformers
        version: "4.57.0.dev0"
      modelFormat:
        name: safetensors
        version: "1.0.0"
      autoSelect: true
      modelArchitecture: Qwen3VLForConditionalGeneration
      version: "1.0.0"
      priority: 1
    - modelFramework:
        name: transformers
        version: "4.57.0.dev0"
      modelFormat:
        name: safetensors
        version: "1.0.0"
      autoSelect: true
      modelArchitecture: Qwen3VLMoeForConditionalGeneration
      version: "1.0.0"
      priority: 1
  modelSizeRange:
    min: 51B
    max: 111B
  protocolVersions:
    - openAI
  engineConfig:
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "8080"
      prometheus.io/path: "/metrics"
    labels:
      logging-forward: enabled
    tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
    volumes:
      - name: dshm
        emptyDir:
          medium: Memory
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: node.kubernetes.io/instance-type
                  operator: In
                  values:
                    - BM.GPU.A100-v2.8
                    - BM.GPU.H100.8
                    - BM.GPU.H200-NC.8
                    - BM.GPU.H200.8
    runner:
      name: ome-container
      image: fra.ocir.io/idqj093njucb/smg:1.4.1-vllm-v0.18.0
      ports:
        - containerPort: 8080
          name: grpc1
          protocol: TCP
      command:
        - vllm
        - serve
      args:
        - "$(MODEL_PATH)"
        - --port
        - "8080"
        - --tensor-parallel-size
        - "4"
        - --served-model-name
        - "vllm-model"
        - --limit-mm-per-prompt
        - '{"video": {"count": 1}, "image": {"count": 10}}'
        - --generation-config
        - auto
        - --enable-prefix-caching
        - --enable-chunked-prefill
        - --max-model-len
        - "-1"
        - --no-scheduler-reserve-full-isl
        - --grpc
      env:
        - name: VLLM_LOGGING_LEVEL
          value: "INFO"
        - name: VLLM_ENGINE_READY_TIMEOUT_S
          value: "3600"
      volumeMounts:
        - mountPath: /dev/shm
          name: dshm
      resources:
        requests:
          cpu: 20
          memory: 160Gi
          nvidia.com/gpu: 4
        limits:
          cpu: 20
          memory: 160Gi
          nvidia.com/gpu: 4

      readinessProbe:
        tcpSocket:
          port: 8080
        failureThreshold: 3
        successThreshold: 1
        periodSeconds: 90
        timeoutSeconds: 60
      livenessProbe:
        tcpSocket:
          port: 8080
        failureThreshold: 5
        successThreshold: 1
        periodSeconds: 60
        timeoutSeconds: 60
      startupProbe:
        tcpSocket:
          port: 8080
        failureThreshold: 150
        successThreshold: 1
        periodSeconds: 6
        initialDelaySeconds: 60
        timeoutSeconds: 30
  routerConfig:
    runner:
      name: router
      image: fra.ocir.io/idqj093njucb/smg:1.4.1
      ports:
        - containerPort: 8080
          name: http
      resources:
        limits:
          cpu: "8"
          memory: 16Gi
      args:
        - --host
        - 0.0.0.0
        - --port
        - "8080"
        - --service-discovery
        - --service-discovery-namespace
        - $(NAMESPACE)
        - --service-discovery-port
        - "8080"
        - --selector
        - component=engine ome.io/inferenceservice=$(INFERENCESERVICE_NAME)
        - --enable-igw
        - --request-id-headers
        - opc-request-id
        - --log-json
        - --disable-retries
        - --disable-circuit-breaker
        - --tool-call-parser
        - qwen
        - --reasoning-parser
        - qwen3
      env:
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: INFERENCESERVICE_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['ome.io/inferenceservice']
      readinessProbe:
        httpGet:
          path: /readiness
          port: 8080
        failureThreshold: 5
        periodSeconds: 30
        timeoutSeconds: 10
      livenessProbe:
        httpGet:
          path: /liveness
          port: 8080
        failureThreshold: 5
        periodSeconds: 30
        timeoutSeconds: 10
      startupProbe:
        httpGet:
          path: /readiness
          port: 8080
        failureThreshold: 60
        periodSeconds: 10
        timeoutSeconds: 10
        initialDelaySeconds: 60
