apiVersion: ome.io/v1beta1
kind: ClusterServingRuntime
metadata:
  name: vllm-gemma-4-tp2
spec:
  disabled: false
  supportedModelFormats:
    - modelFramework:
        name: transformers
        version: "5.5.0.dev0"
      modelFormat:
        name: safetensors
        version: "1.0.0"
      modelArchitecture: Gemma4ForConditionalGeneration
      autoSelect: true
      priority: 1
      version: "1.0.0"
  modelSizeRange:
    min: 28.2B
    max: 34.4B
  protocolVersions:
    - openAI
  routerConfig:
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "29000"
      prometheus.io/path: "/metrics"
    labels:
      logging-forward: enabled
    runner:
      name: router
      image: docker.io/lightseekorg/smg:1.4.1
      ports:
        - containerPort: 8080
          name: http
      resources:
        limits:
          cpu: "1"
          memory: 2Gi
      args:
        - --host
        - 0.0.0.0
        - --port
        - "8080"
        - --service-discovery
        - --service-discovery-namespace
        - $(NAMESPACE)
        - --service-discovery-port
        - "8080"
        - --selector
        - component=engine ome.io/inferenceservice=$(INFERENCESERVICE_NAME)
        - --enable-igw
        - --request-id-headers
        - opc-request-id
        - --log-json
        - --disable-retries
        - --disable-circuit-breaker
        - --disable-tokenizer-autoload
      env:
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: INFERENCESERVICE_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['ome.io/inferenceservice']
      readinessProbe:
        httpGet:
          path: /readiness
          port: 8080
        failureThreshold: 5
        periodSeconds: 30
        timeoutSeconds: 10
      livenessProbe:
        httpGet:
          path: /liveness
          port: 8080
        failureThreshold: 5
        periodSeconds: 30
        timeoutSeconds: 10
      startupProbe:
        httpGet:
          path: /readiness
          port: 8080
        failureThreshold: 10
        periodSeconds: 20
        timeoutSeconds: 10
  engineConfig:
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "8080"
      prometheus.io/path: "/metrics"
    labels:
      logging-forward: enabled
    tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
    volumes:
      - name: dshm
        emptyDir:
          medium: Memory
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: node.kubernetes.io/instance-type
                  operator: In
                  values:
                    - BM.GPU.A100-v2.8
                    - BM.GPU.H100.8
                    - BM.GPU.H200-NC.8
                    - BM.GPU.H200.8
    runner:
      name: ome-container
      image: fra.ocir.io/idqj093njucb/official-vllm-openai:v0.19.1-nightly-gemma4
      ports:
        - containerPort: 8080
          name: http1
          protocol: TCP
      command:
        - /bin/bash
        - '-lc'
        - --
      args:
        - |
          vllm serve \
          --port=8080 \
          --model="$MODEL_PATH" \
          --max-log-len=0 \
          --served-model-name=vllm-model \
          --tensor-parallel-size=2 \
          --max-model-len=-1 \
          --gpu-memory-utilization=0.9 \
          --enable-auto-tool-choice \
          --tool-call-parser=gemma4 \
          --reasoning-parser=gemma4 \
          --async-scheduling \
          --no-scheduler-reserve-full-isl \
          --limit-mm-per-prompt '{"image": 10, "audio": 0, "video": 1}'
      env:
        - name: VLLM_LOGGING_LEVEL
          value: "INFO"
        - name: VLLM_RPC_TIMEOUT
          value: '30000'
        - name: VLLM_ENGINE_ITERATION_TIMEOUT_S
          value: '120'
      volumeMounts:
        - mountPath: /dev/shm
          name: dshm
      resources:
        requests:
          cpu: 10
          memory: 80Gi
          nvidia.com/gpu: 2
        limits:
          cpu: 10
          memory: 80Gi
          nvidia.com/gpu: 2
      readinessProbe:
        httpGet:
          path: /health
          port: 8080
        failureThreshold: 3
        successThreshold: 1
        periodSeconds: 90
        timeoutSeconds: 60
      livenessProbe:
        httpGet:
          path: /health
          port: 8080
        failureThreshold: 5
        successThreshold: 1
        periodSeconds: 60
        timeoutSeconds: 60
      startupProbe:
        httpGet:
          path: /health
          port: 8080
        failureThreshold: 150
        successThreshold: 1
        periodSeconds: 6
        initialDelaySeconds: 60
        timeoutSeconds: 30
