apiVersion: ome.io/v1beta1
kind: ClusterBaseModel
metadata:
  name: minimax-m2-5
spec:
  modelCapabilities:
    - TEXT_TO_TEXT
  vendor: MiniMaxAI
  displayName: minimax.minimax-m2-5
  modelArchitecture: MiniMaxM2ForCausalLM
  disabled: false
  version: "1.0.0"
  modelFormat:
    name: safetensors
    version: "1.0.0"
  modelFramework:
    name: transformers
    version: "4.46.1"
  modelParameterSize: 229B
  quantization: fp8
  storage:
    storageUri: hf://MiniMaxAI/MiniMax-M2.5
    path: /raid/models/MiniMaxAI/MiniMax-M2.5
    key: hf-token
